appId: ${APP_ID}
name: Connections request, accept, block core path
---
- runFlow:
    file: ../subflows/launch.yaml
- runFlow:
    file: ../subflows/register-user.yaml
    env:
      FIRST_NAME: ${CONNECTIONS_OWNER_FIRST_NAME}
      LAST_NAME: ${CONNECTIONS_OWNER_LAST_NAME}
      EMAIL: ${CONNECTIONS_OWNER_EMAIL}
      USERNAME: ${CONNECTIONS_OWNER_USERNAME}
      PHONE: ${CONNECTIONS_OWNER_PHONE}
      PASSWORD: ${CONNECTIONS_OWNER_PASSWORD}
- runFlow:
    file: ../subflows/sign-out.yaml
- runFlow:
    file: ../subflows/register-user.yaml
    env:
      FIRST_NAME: ${CONNECTIONS_REQUESTER_FIRST_NAME}
      LAST_NAME: ${CONNECTIONS_REQUESTER_LAST_NAME}
      EMAIL: ${CONNECTIONS_REQUESTER_EMAIL}
      USERNAME: ${CONNECTIONS_REQUESTER_USERNAME}
      PHONE: ${CONNECTIONS_REQUESTER_PHONE}
      PASSWORD: ${CONNECTIONS_REQUESTER_PASSWORD}
- tapOn:
    id: tab-people
- assertVisible: Build your trusted circle
- tapOn:
    id: connections-target-user-id
- inputText: ${CONNECTIONS_OWNER_FIRST_NAME}
- hideKeyboard
- tapOn:
    id: connections-search-submit
- extendedWaitUntil:
    visible: ${CONNECTIONS_OWNER_FIRST_NAME}
    timeout: 10000
- scrollUntilVisible:
    element:
      text: Connect
    direction: DOWN
    timeout: 10000
- tapOn: Connect
- extendedWaitUntil:
    visible:
      id: connections-success-banner
    timeout: 10000
- runFlow:
    file: ../subflows/sign-out.yaml
- runFlow:
    file: ../subflows/login-user.yaml
    env:
      USERNAME: ${CONNECTIONS_OWNER_USERNAME}
      PASSWORD: ${CONNECTIONS_OWNER_PASSWORD}
- tapOn:
    id: tab-people
- scrollUntilVisible:
    element:
      text: Accept
    direction: DOWN
    timeout: 10000
- tapOn: Accept
- extendedWaitUntil:
    visible:
      id: connections-success-banner
    timeout: 10000
- scrollUntilVisible:
    element:
      text: Block
    direction: DOWN
    timeout: 10000
- tapOn: Block
- extendedWaitUntil:
    visible:
      id: connections-success-banner
    timeout: 10000

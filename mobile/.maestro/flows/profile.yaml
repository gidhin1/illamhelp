appId: ${APP_ID}
name: Profile hero, inline skill edit, media upload, public preview
---
- runFlow:
    file: ../subflows/launch.yaml
- runFlow:
    file: ../subflows/register-user.yaml
    env:
      FIRST_NAME: ${PROFILE_MEMBER_FIRST_NAME}
      LAST_NAME: ${PROFILE_MEMBER_LAST_NAME}
      EMAIL: ${PROFILE_MEMBER_EMAIL}
      USERNAME: ${PROFILE_MEMBER_USERNAME}
      PHONE: ${PROFILE_MEMBER_PHONE}
      PASSWORD: ${PROFILE_MEMBER_PASSWORD}
- tapOn:
    id: tab-profile
- assertVisible: Present yourself with confidence
- tapOn:
    id: profile-city
- inputText: Kochi
- tapOn:
    id: profile-area
- inputText: Kakkanad
- tapOn:
    id: profile-skill-picker-trigger
- tapOn:
    id: profile-skill-option-plumbing
- tapOn:
    id: profile-skill-proficiency-advanced
- tapOn:
    id: profile-skill-add
- tapOn:
    id: profile-skill-level-plumbing-expert
- tapOn:
    id: profile-phone
- inputText: ${PROFILE_MEMBER_PHONE}
- hideKeyboard
- scrollUntilVisible:
    element:
      id: profile-save
    direction: DOWN
    timeout: 10000
- tapOn:
    id: profile-save
- extendedWaitUntil:
    visible: Profile updated.
    timeout: 10000
- scrollUntilVisible:
    element:
      id: profile-public-load
    direction: DOWN
    timeout: 10000
- tapOn:
    id: profile-public-load
- extendedWaitUntil:
    visible:
      id: profile-public-empty
    timeout: 10000

server:
  port: ${PORT:4000}
  compression:
    enabled: true
  forward-headers-strategy: framework

spring:
  application:
    name: illamhelp-api
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:illamhelp}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:30000}
      connection-timeout: ${DB_POOL_CONNECT_TIMEOUT_MS:5000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:illamhelp}}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /api/docs

illamhelp:
  api-prefix: /api/v1
  cors-origins: ${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:3002,http://127.0.0.1:3002,http://localhost:3003,http://127.0.0.1:3003}
  strict-origin-check: ${STRICT_ORIGIN_CHECK:true}
  profile-pii-encryption-key: ${PROFILE_PII_ENCRYPTION_KEY:}
  auth-rate-limit-window-ms: ${AUTH_RATE_LIMIT_WINDOW_MS:60000}
  auth-rate-limit-max: ${AUTH_RATE_LIMIT_MAX:10}
  jobs-write-rate-limit-window-ms: ${JOBS_WRITE_RATE_LIMIT_WINDOW_MS:60000}
  jobs-write-rate-limit-max: ${JOBS_WRITE_RATE_LIMIT_MAX:30}
  job-assignment-revoke-window-minutes: ${JOB_ASSIGNMENT_REVOKE_WINDOW_MINUTES:30}
  connections-write-rate-limit-window-ms: ${CONNECTIONS_WRITE_RATE_LIMIT_WINDOW_MS:60000}
  connections-write-rate-limit-max: ${CONNECTIONS_WRITE_RATE_LIMIT_MAX:30}
  consent-write-rate-limit-window-ms: ${CONSENT_WRITE_RATE_LIMIT_WINDOW_MS:60000}
  consent-write-rate-limit-max: ${CONSENT_WRITE_RATE_LIMIT_MAX:30}
  media-write-rate-limit-window-ms: ${MEDIA_WRITE_RATE_LIMIT_WINDOW_MS:60000}
  media-write-rate-limit-max: ${MEDIA_WRITE_RATE_LIMIT_MAX:20}
  search-rate-limit-window-ms: ${SEARCH_RATE_LIMIT_WINDOW_MS:60000}
  search-rate-limit-max: ${SEARCH_RATE_LIMIT_MAX:120}
  opa-url: ${OPA_URL:http://localhost:8181}
  keycloak-url: ${KEYCLOAK_URL:http://localhost:8080}
  keycloak-realm: ${KEYCLOAK_REALM:illamhelp}
  keycloak-client-id: ${KEYCLOAK_CLIENT_ID:illamhelp-web}
  keycloak-client-secret: ${KEYCLOAK_CLIENT_SECRET:}
  keycloak-admin-realm: ${KEYCLOAK_ADMIN_REALM:master}
  keycloak-admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
  keycloak-admin-username: ${KEYCLOAK_ADMIN:}
  keycloak-admin-password: ${KEYCLOAK_ADMIN_PASSWORD:}
  minio-endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  minio-access-key: ${MINIO_ROOT_USER:}
  minio-secret-key: ${MINIO_ROOT_PASSWORD:}
  minio-region: ${MINIO_REGION:us-east-1}
  minio-quarantine-bucket: ${MINIO_BUCKET_QUARANTINE:illamhelp-quarantine}
  minio-approved-bucket: ${MINIO_BUCKET_APPROVED:illamhelp-approved}
  media-max-image-bytes: ${MEDIA_MAX_IMAGE_BYTES:10485760}
  media-max-video-bytes: ${MEDIA_MAX_VIDEO_BYTES:104857600}
  media-allowed-image-types: ${MEDIA_ALLOWED_IMAGE_TYPES:image/jpeg,image/png,image/webp}
  media-allowed-video-types: ${MEDIA_ALLOWED_VIDEO_TYPES:video/mp4,video/quicktime,video/webm}
  open-search-enabled: ${OPENSEARCH_ENABLED:true}
  open-search-url: ${OPENSEARCH_URL:http://localhost:9200}
  open-search-index-jobs: ${OPENSEARCH_INDEX_JOBS:jobs}
  open-search-timeout-ms: ${OPENSEARCH_TIMEOUT_MS:750}
